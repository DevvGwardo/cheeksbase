<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Cheeksbase{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    main.container { max-width: 1100px; padding-top: 2rem; padding-bottom: 4rem; }
    nav.breadcrumb { font-size: 0.9rem; margin-bottom: 1rem; color: var(--pico-muted-color); }
    nav.breadcrumb a { text-decoration: none; }
    .muted { color: var(--pico-muted-color); }
    .pill {
      display: inline-block;
      padding: 0.1rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      background: var(--pico-secondary-background);
      color: var(--pico-secondary-inverse);
    }
    .pill.stale { background: #f59e0b; color: white; }
    .pill.fresh { background: #10b981; color: white; }
    .pill.unsynced { background: var(--pico-muted-border-color); color: var(--pico-muted-color); }
    table.rows td, table.rows th { white-space: nowrap; max-width: 30ch; overflow: hidden; text-overflow: ellipsis; }
    .pagination { display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem; }
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--pico-muted-color); }
    .empty-state code { background: var(--pico-code-background-color); padding: 0.1rem 0.4rem; border-radius: 4px; }
    h1 small { font-size: 0.6em; color: var(--pico-muted-color); font-weight: normal; }
  </style>
</head>
<body>
<main class="container">
  <header>
    <h1>
      <a href="/" style="text-decoration:none;color:inherit">&#x1F528; Cheeksbase</a>
      <small>your data, browsable</small>
    </h1>
  </header>
  {% block breadcrumb %}{% endblock %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
