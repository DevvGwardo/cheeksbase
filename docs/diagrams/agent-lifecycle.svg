<text x="748" y="292" text-anchor="middle" fill="#94a3b8" font-size="9">marks run complete</text>

<rect x="20" y="340" width="860" height="70" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/><rect x="20" y="340" width="860" height="70" rx="10" fill="rgba(76,29,149,0.12)"/>
